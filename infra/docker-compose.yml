services:
  app:
    build:
      context: ../app
      dockerfile: ../infra/Dockerfile.app
    volumes:
      - ../app:/var/www/html
      - app-storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: airport_platform
      DB_USERNAME: airport
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      QUEUE_CONNECTION: redis
      SCRAPER_RUNTIME_URL: http://scraper-runtime:3000
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: http://minio:9000
      AWS_BUCKET: airport-artifacts
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - airport-net

  scraper-runtime:
    build:
      context: ../scraper-runtime
      dockerfile: ../infra/Dockerfile.scraper
    environment:
      PORT: 3000
      LOG_LEVEL: info
    # No host-port binding: the scraper runtime is reached by other containers
    # on the internal Docker network (http://scraper-runtime:3000).
    # Expose only if you need direct host access for debugging.
    networks:
      - airport-net

  queue-worker:
    build:
      context: ../app
      dockerfile: ../infra/Dockerfile.app
    command: php artisan queue:work --queue=scrape-high,scrape-default,normalize,state-update,alerts,repairs,repair,maintenance --tries=3 --sleep=3
    volumes:
      - ../app:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: airport_platform
      DB_USERNAME: airport
      DB_PASSWORD: secret
      REDIS_HOST: redis
      REDIS_CLIENT: predis
      QUEUE_CONNECTION: redis
      SCRAPER_RUNTIME_URL: http://scraper-runtime:3000
      FILESYSTEM_DISK: s3
      AWS_ENDPOINT: http://minio:9000
      AWS_BUCKET: airport-artifacts
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      AWS_DEFAULT_REGION: us-east-1
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      - app
      - postgres
      - redis
      - minio-init
    networks:
      - airport-net

  scheduler:
    build:
      context: ../app
      dockerfile: ../infra/Dockerfile.app
    command: php artisan schedule:work
    volumes:
      - ../app:/var/www/html
    environment:
      APP_ENV: local
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: airport_platform
      DB_USERNAME: airport
      DB_PASSWORD: secret
      REDIS_HOST: redis
      QUEUE_CONNECTION: redis
    depends_on:
      - app
      - postgres
      - redis
    networks:
      - airport-net

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ../app/public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - airport-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: airport_platform
      POSTGRES_USER: airport
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airport -d airport_platform"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - airport-net

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - airport-net

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - airport-net

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minio minio123 &&
        mc mb --ignore-existing local/airport-artifacts &&
        echo 'minio-init: bucket airport-artifacts ready'
      "
    networks:
      - airport-net

volumes:
  postgres-data:
  redis-data:
  minio-data:
  app-storage:

networks:
  airport-net:
    driver: bridge
